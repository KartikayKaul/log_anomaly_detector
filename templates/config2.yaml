    message: "User {username} performed upload on {resource} status={status_code} latency={latency}ms size={payload_size}kb"


### anomaies below
  - name: scrambled_order
    level: INFO
    category: anomaly
    service: api-service
    message: "latency={latency}ms user={username} {resource} performed action={action} status={status_code}"

  - name: missing_keywords
    level: INFO
    category: anomaly
    service: api-service
    message: "{username} {action} {resource} {status_code} {latency}"

  - name: reversed_semantics
    level: INFO
    category: anomaly
    service: api-service
    message: "{resource} performed {username} action={action} latency={latency} status={status_code}"

  - name: corrupted_field_format
    level: INFO
    category: anomaly
    service: api-service
    message: "User:{username}|action->{action}|resource->{resource}|status:{status_code}|latency::{latency}"

  - name: random_field_shuffle
    level: INFO
    category: anomaly
    service: api-service
    message: "{latency}ms {username} performed {resource} status {status_code} action {action}"

  - name: malformed_log
    level: INFO
    category: anomaly
    service: api-service
    message: "### {username} ::: {action} >>> {resource} ??? status={status_code}"

  - name: partial_template
    level: INFO
    category: anomaly
    service: api-service
    message: "User {username} status={status_code}"

  - name: repeated_tokens
    level: INFO
    category: anomaly
    service: api-service
    message: "{username} {username} {username} performed performed {action} {action} {resource}"

  - name: nonsense_structure
    level: INFO
    category: anomaly
    service: api-service
    message: "!!! {username} *** {action} @@@ {resource} ### {status_code} $$$"

  - name: garbage_mix
    level: INFO
    category: anomaly
    service: api-service
    message: "{username} 9xA2 {action} ___ {resource} 00FF latency=={latency}"

  - name: broken_key_value
    level: INFO
    category: anomaly
    service: api-service
    message: "user {username} action {action} resource {resource} status {status_code} latency {latency}"

  - name: corrupted_template
    level: INFO
    category: anomaly
    service: storage-service
    message: "upload upload upload {resource} user user {username} size size {payload_size}"

## garbage anomalies

  - name: random_noise
    level: INFO
    category: anomaly
    service: api-service
    message: "X9AFJ2 {username} ZZZZ 00AA {resource} ***"

  - name: hex_garbage
    level: INFO
    category: anomaly
    service: api-service
    message: "0xA92F 0xFFAA {username} 0xDEAD {resource}"

  - name: mixed_symbols
    level: INFO
    category: anomaly
    service: api-service
    message: "@@@ {username} !!! {action} ### {resource} $$$"