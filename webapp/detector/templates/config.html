{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Data Config</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<style>
/* ───────────────────────────────
   RESET & BASE
─────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}

/* ───────────────────────────────
   NAVBAR
─────────────────────────────── */
.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
  padding: 0 32px;
  height: 62px;
  box-shadow: 0 4px 16px rgba(37, 99, 235, 0.25);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-title {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
}

.nav-link {
  color: rgba(255, 255, 255, 0.75);
  text-decoration: none;
  font-size: 13.5px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: 7px;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}

.nav-link:hover {
  background: rgba(255, 255, 255, 0.12);
  color: #fff;
}

.nav-link.active {
  background: rgba(255, 255, 255, 0.18);
  color: #fff;
  font-weight: 600;
}

/* ───────────────────────────────
   PAGE CONTENT
─────────────────────────────── */
.page-content {
  padding: 32px 16px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.page-content > * {
  width: 100%;
  max-width: 640px;
}

/* ───────────────────────────────
   HEADINGS
─────────────────────────────── */
h2 {
  font-size: 18px;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 20px;
}

h3 {
  font-size: 11px;
  font-weight: 700;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  margin-bottom: 16px;
}

/* ───────────────────────────────
   UPLOAD BOX
─────────────────────────────── */
.box {
  background: #fff;
  padding: 28px;
  border-radius: 14px;
  border: 1px solid #e5e7eb;
  position: relative;
  overflow: hidden;
}

.box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #3b82f6, #60a5fa);
}

/* ───────────────────────────────
   UPLOAD CARD
─────────────────────────────── */
.upload-card {
  border: 1.5px dashed #d1d5db;
  border-radius: 10px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  margin-bottom: 12px;
  background: #fafafa;
  transition: border-color 0.15s, background 0.15s;
}

.upload-card:hover {
  border-color: #3b82f6;
  background: #eff6ff;
}

.main-text {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 6px;
  color: #374151;
}

.sub-text {
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 18px;
}

.upload-btn {
  background: #3b82f6;
  color: #fff;
  padding: 7px 18px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  display: inline-block;
}

#file-name {
  font-size: 12px;
  color: #6b7280;
  margin-bottom: 12px;
  min-height: 18px;
}

/* ───────────────────────────────
   SUBMIT BUTTON
─────────────────────────────── */
.btn-submit {
  display: block;
  width: 100%;
  margin-top: 8px;
  padding: 11px 20px;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.2px;
  box-shadow: 0 2px 8px rgba(59, 130, 246, 0.35);
  transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
  text-align: center;
  text-decoration: none;
}

.btn-submit:hover {
  opacity: 0.92;
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(59, 130, 246, 0.45);
}

.btn-submit:active {
  transform: translateY(0);
  box-shadow: 0 2px 6px rgba(59, 130, 246, 0.3);
}

/* ───────────────────────────────
   RESULT BOX
─────────────────────────────── */
.result-box {
  margin-top: 28px;
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  padding: 24px 28px;
  position: relative;
  overflow: hidden;
}

.result-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #22c55e, #86efac);
}

.result-box pre {
  background: #f8fafc;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 16px;
  font-family: 'Courier New', monospace;
  font-size: 12.5px;
  color: #1a1a2e;
  line-height: 1.6;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 400px;
  overflow-y: auto;
}

.result-box pre::-webkit-scrollbar {
  width: 5px;
  height: 5px;
}

.result-box pre::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 4px;
}

.result-box pre::-webkit-scrollbar-track {
  background: transparent;
}

/* ───────────────────────────────
   DOWNLOAD BUTTONS ROW
─────────────────────────────── */
.download-row {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.download-row .btn-submit {
  width: auto;
  flex: 1;
}

/* ───────────────────────────────
   RESPONSIVE
─────────────────────────────── */
@media (max-width: 768px) {
  .navbar {
    flex-direction: column;
    height: auto;
    padding: 14px 16px;
    gap: 10px;
    align-items: flex-start;
  }

  .nav-links {
    flex-wrap: wrap;
    gap: 6px;
  }

  .page-content {
    padding: 20px 16px 40px;
    max-width: 100%;
  }

  .download-row {
    flex-direction: column;
  }
}
</style>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-brand">
    <span class="nav-title">Log Anomaly Detection System</span>
  </div>
  <div class="nav-links">
    <a href="{% url 'home' %}" class="nav-link">Dashboard</a>
    <a href="{% url 'testing' %}" class="nav-link">Testing</a>
    <a href="{% url 'config' %}" class="nav-link active">Data Config</a>
  </div>
</nav>

<div class="page-content">

  <!-- Upload Config File -->
  <div class="box">
    <h2>Upload Config File</h2>
    <form method="POST" enctype="multipart/form-data" action="{% url 'config' %}">
      {% csrf_token %}
      <input type="hidden" name="action" value="upload_config_file">

      <div class="upload-card" onclick="document.getElementById('configFile').click();">
        <p class="main-text">Select Config File</p>
        <p class="sub-text">Supported: YAML, JSON</p>
        <span class="upload-btn">Choose File</span>
      </div>

      <input
        type="file"
        id="configFile"
        name="config_file"
        accept=".yaml,.yml,.json"
        style="display: none;"
        onchange="document.getElementById('file-name').innerText = this.files[0]?.name || '';"
      >
      <p id="file-name"></p>

      <button type="submit" class="btn-submit">Upload Config</button>

    </form>
  </div>

  <!-- Result Section -->
  {% if result_data %}
  <div class="result-box">
    <h3>Generated Result</h3>
    <pre>{{ result_data }}</pre>
  </div>
  <div class="download-row">
    <a href="/download/json/" class="btn-submit">Download JSONL</a>
    <a href="/download/log/" class="btn-submit">Download LOG</a>
  </div>
  <script>
    document.querySelector('.result-box').scrollIntoView({ behavior: 'smooth' });
  </script>
  {% endif %}

</div>

</body>
</html>
